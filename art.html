<!-- ART POPUP VIEWER - NEW LIGHTBOX STYLE -->
<div id="art-lightbox" class="lightbox-overlay">
  <img id="lightbox-img" src="" alt="Enlarged artwork">
  <div id="lightbox-caption">
    <h2 id="lightbox-title"></h2>
    <p id="lightbox-blurb"></p>
  </div>
</div>


<script>
// ——— LIGHTBOX WITH CLICK-TO-ZOOM + HOVER PAN ———
const lightbox = document.getElementById('art-lightbox');
const lightboxImg = document.getElementById('lightbox-img');

// Open lightbox
document.querySelectorAll('.art-card').forEach(card => {
  card.addEventListener('click', () => {
    const imgSrc = card.querySelector('.art-thumb img').src;
    const title = card.querySelector('.art-title').innerText;
    const blurb = card.getAttribute('data-blurb') || '';

    lightboxImg.src = imgSrc;
    document.getElementById('lightbox-title').innerText = title;
    document.getElementById('lightbox-blurb').innerText = blurb;

    lightbox.classList.add('active');
    lightboxImg.classList.remove('zoomed'); // start unzoomed
  });
});

// Click image to toggle zoom
lightboxImg.addEventListener('click', (e) => {
  e.stopPropagation(); // ← super important: prevents backdrop click from closing
  lightboxImg.classList.toggle('zoomed');
});

// Update zoom origin as mouse moves (only when zoomed)
lightboxImg.addEventListener('mousemove', (e) => {
  if (!lightboxImg.classList.contains('zoomed')) return;

  const rect = lightboxImg.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;

  lightboxImg.style.setProperty('--mouse-x', x + '%');
  lightboxImg.style.setProperty('--mouse-y', y + '%');
});

// Close only when clicking the backdrop (not the image or caption)
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    lightbox.classList.remove('active');
    lightboxImg.classList.remove('zoomed');
  }
});

// When opening
lightbox.classList.add('active');
document.body.classList.add('lightbox-open');   // ← add this

// When closing
lightbox.classList.remove('active');
document.body.classList.remove('lightbox-open'); // ← add this
</script>
